<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <h1>check BMI</h1>
        <div>
            <span>input weight</span>
            <input type="text" id="weight">
        </div><br />

        <div>
            <span>input height</span>
            <input type="text" id="height">
        </div><br />

        <button type="button" onclick="BMI()">check</button>
        <h3 id="mess"></h3>

    </form>
    <script>


        function BMI() {
            let kg = parseFloat(document.getElementById('weight').value);
            let m = parseFloat(document.getElementById('height').value);
            bmi = kg / (m*m)

            if (bmi < 18.5) {
                result="Underweight"
            } else if (bmi < 25.0) {
                result="Normal"
            } else if (bmi < 30.0) {
                result="Overweight"
            } else {
               result= "Obese"
            }
            document.getElementById('mess').innerHTML = "Chỉ số BMI của bạn: " + bmi.toFixed(2) + " - " + result;
        }
        

    </script>
</body>

</html>
