<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
        button {
            width: 100%;
        }
       
    </style>
<body>
  <input type="text" id="View"><br><br>
<div class="thang">
    <table>
        <tr>
            <td><button type="button" class="btn" value="1"> 1 </button></td>
            <td><button type="button" class="btn" value="2"> 2 </button></td>
            <td><button type="button" class="btn" value="3"> 3 </button></td>
            <td><button type="button" class="btn" value="+"> + </button></td>
        </tr>
        <tr>
            <td><button type="button" class="btn" value="4"> 4 </button></td>
            <td><button type="button" class="btn" value="5"> 5 </button></td>
            <td><button type="button" class="btn" value="6"> 6 </button></td>
            <td><button type="button" class="btn" value="-"> - </button></td>
        </tr>
        <tr>
            <td><button type="button" class="btn" value="7"> 7 </button></td>
            <td><button type="button" class="btn" value="8"> 8 </button></td>
            <td><button type="button" class="btn" value="9"> 9 </button></td>
            <td><button type="button" class="btn" value="*"> x </button></td>
        </tr>
        <tr>
            <td><button type="button" id="clear"> C </button></td>
            <td><button type="button" class="btn" value="0"> 0 </button></td>
            <td><button type="button" id="result"> = </button></td>
            <td><button type="button" class="btn" value="/"> / </button></td>
        </tr>
    </table>
</div>
    <script>
    // 1. Lấy đúng phần tử ô input
    let viewInput = document.getElementById('View');

    // 2. Lấy tất cả các nút có class là 'btn'
    let buttons = document.querySelectorAll('.btn');

    // 3. Duyệt qua từng nút và thêm sự kiện click
    buttons.forEach(button => {
        button.addEventListener('click', function() {
            // Lấy giá trị của nút (từ thuộc tính value) và cộng dồn vào ô input
            viewInput.value += this.value;
        });
    });

    // 4. Xử lý riêng nút xóa (C)
    document.getElementById('clear').onclick = function() {
        viewInput.value = "";
    };

    // 5. Xử lý riêng nút bằng (=) để tính kết quả
  document.getElementById('result').onclick = function() {
    let expression = viewInput.value;

    // 1. Kiểm tra nếu ô input trống
    if (expression === "") {
        alert("Vui lòng nhập phép tính!");
    } 
    // 2. Kiểm tra lỗi cơ bản (ví dụ kết thúc bằng một phép tính như '1+')
    else if (isInvalid(expression)) {
        viewInput.value = "Lỗi cú pháp!";
    } 
    // 3. Nếu mọi thứ ổn thì tính toán
    else {
        viewInput.value = eval(expression);
    }
};

  
    </script>
</div>
</body>
</html>
