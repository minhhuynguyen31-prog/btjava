<style>
    .puzzle-container {
        display: flex;
        /* Xếp 3 ảnh nằm ngang */

        /* Tổng chiều rộng của cả bức ảnh lớn */

        /* Chiều cao của ảnh */
        border: 2px solid #605b5b;
    }

    .puzzle-part {
        width: 200px;
        /* 600px chia 3 = 200px mỗi mảnh */
        height: 100%;
        object-fit: cover;
        /* Giúp ảnh không bị méo khi cắt */
        cursor: pointer;
        border: 1px solid #827f7f;
        /* Tạo đường kẻ trắng phân chia các mảnh */
    }

    /* Mảnh 1: Lấy phần bên trái cùng */
    #img1 {
        object-position: 0% 0%;
    }

    /* Mảnh 2: Lấy phần ở giữa */
    #img2 {
        object-position: 50% 0%;
    }

    /* Mảnh 3: Lấy phần bên phải cùng */
    #img3 {
        object-position: 100% 0%;

</style>
