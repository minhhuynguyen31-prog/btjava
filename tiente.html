<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .content {
        display: flex;

    }
</style>
<script>
    function convertMoney() {
        let amount = document.getElementById('amountInput').value;
        let number = parseFloat(amount);
        let from = document.getElementById('from').value;
        let to = document.getElementById('to').value;
        let result = 0;

        // Kiểm tra nếu người dùng chưa nhập số
        if (isNaN(number)) {
            alert("Vui lòng nhập một số hợp lệ");
            return;
        }
      
        if (from === "vnd" && to === "usd") {
            result = number / 26000;
        } else if (from === "usd" && to === "vnd") {
            result = number * 26000;
        } else {
            result = number; // Cùng loại tiền tệ
        }



        document.getElementById('resultMessage').innerHTML = 'Result: ' + result.toLocaleString() + ' ' + to;
    }





</script>

<body>
    <form action="" class="content">
        <div class="row">
            <span><strong>Amount</strong></span><br />
            <input type="number" id="amountInput">

        </div>
        <div class="row">
            <span><strong>From Currency</strong></span><br />
            <select  id="from">
                <option value="vnd">Vnd</option>
                <option value="usd">usd</option>
            </select>

        </div>
        <div class="row">
            <span><strong>To Currency</strong></span><br />
            <select  id="to">
                <option value="usd">usd</option>
                <option value="vnd">Vnd</option>
            </select>
        </div>

        <br>
        <button type="button" onclick="convertMoney()">Convert</button>
        <div id="resultMessage" style="margin-top: 10px; font-weight: bold;"></div>
    </form>
</body>

</html>
